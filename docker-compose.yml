version: '3.8'

# ===========================================
# FILMERSHUB - DOCKER COMPOSE
# ===========================================
# Serviços: PostgreSQL, Redis, Backend (Django), Frontend (React)
# Comando: docker-compose up -d
# Parar: docker-compose down

services:
  # ===========================================
  # POSTGRESQL - Banco de dados relacional
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: filmershub-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: filmershub
      POSTGRES_USER: filmershub
      POSTGRES_PASSWORD: filmershub
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmershub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS - Cache + Backend do Django Channels
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: filmershub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # BACKEND - Django + DRF + Channels
  # ===========================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: filmershub-backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://filmershub:filmershub@db:5432/filmershub
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================
  # FRONTEND - React + Vite + TypeScript
  # ===========================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: filmershub-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

# ===========================================
# VOLUMES PERSISTENTES
# ===========================================
# Dados que não somem ao parar os containers
volumes:
  postgres_data:
  static_volume:
  media_volume:
